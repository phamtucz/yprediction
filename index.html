<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Y Prediction | Global Market Liquidity</title>
    <style>
        /* --- CSS Styling --- */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Background Layer for Stars */
        #stars-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Foreground Layer for Interactive Network */
        #liquidity-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
        }

        /* Glassmorphism Content Box */
        .content {
            position: relative;
            z-index: 3;
            text-align: center;
            background: rgba(0, 0, 0, 0.6);
            padding: 40px 30px;
            border-radius: 4px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
            width: 85%;
            max-width: 500px;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            margin: 0 0 10px 0;
            letter-spacing: 6px;
            text-transform: uppercase;
        }

        h1 span {
            color: #ffffff;
            animation: glow 4s infinite ease-in-out;
        }

        .tagline {
            font-size: 0.8rem;
            font-weight: 300;
            margin-bottom: 30px;
            opacity: 0.6;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .email-link {
            font-size: 1rem;
            color: #ffffff;
            text-decoration: none;
            opacity: 0.8;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding-bottom: 5px;
            word-break: break-all;
        }

        .email-link:hover {
            opacity: 1;
            border-bottom: 1px solid rgba(255, 255, 255, 1);
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        /* --- MOBILE RESPONSIVE --- */
        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
                letter-spacing: 4px;
            }
            .content {
                padding: 35px 20px;
            }
            .tagline {
                font-size: 0.7rem;
                letter-spacing: 2px;
            }
        }

        @keyframes glow {
            0% { opacity: 1; text-shadow: 0 0 10px rgba(255,255,255,0.2); }
            50% { opacity: 0.7; text-shadow: 0 0 30px rgba(255,255,255,0.5); }
            100% { opacity: 1; text-shadow: 0 0 10px rgba(255,255,255,0.2); }
        }
    </style>
</head>
<body>

    <canvas id="stars-canvas"></canvas>
    <canvas id="liquidity-canvas"></canvas>

    <div class="content">
        <h1><span>Y</span> PREDICTION</h1>
        <p class="tagline">Providing Market Liquidity</p>
        <a href="mailto:hi@yprediction.com" class="email-link">hi@yprediction.com</a>
    </div>

    <script>
        // --- INITIAL SETUP ---
        const isMobile = window.innerWidth < 768;

        // STARS CONFIG
        const starsCanvas = document.getElementById('stars-canvas');
        const sCtx = starsCanvas.getContext('2d');
        let stars = [];
        let starCount = isMobile ? 60 : 100; // Increased count for mobile visibility

        // NETWORK CONFIG
        const netCanvas = document.getElementById('liquidity-canvas');
        const nCtx = netCanvas.getContext('2d');
        let netParticles = [];
        let netCount = isMobile ? 50 : 120;
        let connectionDist = 140;

        function resize() {
            starsCanvas.width = netCanvas.width = window.innerWidth;
            starsCanvas.height = netCanvas.height = window.innerHeight;
            init();
        }
        window.addEventListener('resize', resize);

        // --- STAR LOGIC (Enhanced for Mobile) ---
        class Star {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * starsCanvas.width;
                this.y = Math.random() * starsCanvas.height;
                // Slightly larger stars on mobile to combat high pixel density
                this.size = isMobile ? (Math.random() * 1.6 + 0.4) : (Math.random() * 1.2);
                this.speedX = (Math.random() - 0.5) * 0.05;
                this.speedY = (Math.random() - 0.5) * 0.05;
                this.opacity = Math.random() * 0.6 + 0.2; // Base visibility
                this.fadeSpeed = Math.random() * 0.005 + 0.002;
                this.dir = 1;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                // Screen wrapping
                if (this.x < 0) this.x = starsCanvas.width;
                if (this.x > starsCanvas.width) this.x = 0;
                if (this.y < 0) this.y = starsCanvas.height;
                if (this.y > starsCanvas.height) this.y = 0;

                // Twinkle effect
                this.opacity += this.fadeSpeed * this.dir;
                if (this.opacity > 0.9 || this.opacity < 0.2) this.dir *= -1;
            }
            draw() {
                sCtx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                sCtx.beginPath();
                sCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                sCtx.fill();
            }
        }

        // --- NETWORK LOGIC ---
        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * netCanvas.width;
                this.y = Math.random() * netCanvas.height;
                this.size = Math.random() * 1.5 + 0.5;
                this.speedX = (Math.random() - 0.5) * 0.4;
                this.speedY = (Math.random() - 0.5) * 0.4;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x < 0 || this.x > netCanvas.width) this.speedX *= -1;
                if (this.y < 0 || this.y > netCanvas.height) this.speedY *= -1;
            }
            draw() {
                nCtx.fillStyle = "rgba(255, 255, 255, 0.5)";
                nCtx.beginPath();
                nCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                nCtx.fill();
            }
        }

        function init() {
            stars = [];
            for (let i = 0; i < starCount; i++) stars.push(new Star());

            netParticles = [];
            for (let i = 0; i < netCount; i++) netParticles.push(new Particle());
        }

        function drawConnections() {
            for (let i = 0; i < netParticles.length; i++) {
                for (let j = i; j < netParticles.length; j++) {
                    let dx = netParticles[i].x - netParticles[j].x;
                    let dy = netParticles[i].y - netParticles[j].y;
                    let dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < connectionDist) {
                        let opac = (1 - (dist / connectionDist)) * 0.15;
                        nCtx.strokeStyle = `rgba(255, 255, 255, ${opac})`;
                        nCtx.lineWidth = 0.5;
                        nCtx.beginPath();
                        nCtx.moveTo(netParticles[i].x, netParticles[i].y);
                        nCtx.lineTo(netParticles[j].x, netParticles[j].y);
                        nCtx.stroke();
                    }
                }
            }
        }

        function animate() {
            sCtx.clearRect(0, 0, starsCanvas.width, starsCanvas.height);
            nCtx.clearRect(0, 0, netCanvas.width, netCanvas.height);

            stars.forEach(s => { s.update(); s.draw(); });
            netParticles.forEach(p => { p.update(); p.draw(); });
            drawConnections();

            requestAnimationFrame(animate);
        }

        resize();
        animate();
    </script>
</body>
</html>
