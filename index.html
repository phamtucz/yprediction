<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Y Prediction | Global Market Liquidity</title>
    <style>
        /* --- CSS Styling --- */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Canvas nền cho sao */
        #stars-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1; /* Nằm dưới cùng */
            opacity: 0.6; /* Làm mờ nhẹ các ngôi sao */
        }

        /* Canvas cho mạng lưới mạng lưới */
        #liquidity-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2; /* Nằm trên sao */
        }

        /* Glassmorphism Content Box */
        .content {
            position: relative;
            z-index: 3; /* Nằm trên cùng */
            text-align: center;
            background: rgba(0, 0, 0, 0.6);
            padding: 40px 30px;
            border-radius: 2px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            width: 80%;
            max-width: 600px;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            margin: 0 0 10px 0;
            letter-spacing: 6px;
            text-transform: uppercase;
        }

        h1 span {
            color: #ffffff;
            animation: glow 4s infinite ease-in-out;
        }

        .tagline {
            font-size: 0.8rem;
            font-weight: 300;
            margin-bottom: 30px;
            opacity: 0.6;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .email-link {
            font-size: 1rem;
            color: #ffffff;
            text-decoration: none;
            opacity: 0.8;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding-bottom: 5px;
            word-break: break-all;
        }

        .email-link:hover {
            opacity: 1;
            border-bottom: 1px solid rgba(255, 255, 255, 1);
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        /* --- RESPONSIVE ADJUSTMENTS --- */
        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
                letter-spacing: 4px;
            }
            .content {
                padding: 40px 20px;
                width: 85%;
            }
            .tagline {
                font-size: 0.7rem;
                letter-spacing: 2px;
            }
        }

        @keyframes glow {
            0% { opacity: 1; text-shadow: 0 0 10px rgba(255,255,255,0.2); }
            50% { opacity: 0.7; text-shadow: 0 0 30px rgba(255,255,255,0.5); }
            100% { opacity: 1; text-shadow: 0 0 10px rgba(255,255,255,0.2); }
        }
    </style>
</head>
<body>

    <canvas id="stars-canvas"></canvas>
    <canvas id="liquidity-canvas"></canvas>

    <div class="content">
        <h1><span>Y</span> PREDICTION</h1>
        <p class="tagline">Providing Market Liquidity</p>
        <a href="mailto:hi@yprediction.com" class="email-link">hi@yprediction.com</a>
    </div>

    <script>
        // --- CẤU HÌNH CHUNG ---
        const isMobile = window.innerWidth < 768;

        // --- CẤU HÌNH CHO SAO (STARS) ---
        const starsCanvas = document.getElementById('stars-canvas');
        const starsCtx = starsCanvas.getContext('2d');
        let starParticles = [];
        // Số lượng sao ít hơn để tinh tế
        let starCount = isMobile ? 30 : 70; 

        // --- CẤU HÌNH CHO MẠNG LƯỚI (NET) ---
        const netCanvas = document.getElementById('liquidity-canvas');
        const netCtx = netCanvas.getContext('2d');
        let netParticles = [];
        // Số lượng hạt mạng lưới
        let netParticleCount = isMobile ? 60 : 130; 
        const netConnectionDistance = 140;

        // --- HÀM RESIZE CHUNG ---
        function resize() {
            starsCanvas.width = netCanvas.width = window.innerWidth;
            starsCanvas.height = netCanvas.height = window.innerHeight;
            
            const newIsMobile = window.innerWidth < 768;
            starCount = newIsMobile ? 30 : 70;
            netParticleCount = newIsMobile ? 60 : 130;
            
            initStars();
            initNet();
        }
        window.addEventListener('resize', resize);
        resize(); // Gọi lần đầu

        // ==========================================
        // --- PHẦN 1: XỬ LÝ SAO (STARS) ---
        // ==========================================
        class StarParticle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * starsCanvas.width;
                this.y = Math.random() * starsCanvas.height;
                // Kích thước sao nhỏ, ngẫu nhiên
                this.size = Math.random() * 1.1; 
                // Di chuyển cực chậm
                this.speedX = (Math.random() - 0.5) * 0.05; 
                this.speedY = (Math.random() - 0.5) * 0.05;
                
                // Hiệu ứng lấp lánh (opacity thay đổi chậm)
                this.opacity = Math.random();
                this.fadeSpeed = Math.random() * 0.003 + 0.001; // Chậm hơn hạt mạng lưới
                this.direction = 1;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                // Xử lý tràn màn hình
                if (this.x > starsCanvas.width || this.x < 0) this.speedX *= -1;
                if (this.y > starsCanvas.height || this.y < 0) this.speedY *= -1;

                // Cập nhật độ mờ (lấp lánh)
                this.opacity += this.fadeSpeed * this.direction;
                if (this.opacity > 1 || this.opacity < 0.2) this.direction *= -1;
            }

            draw() {
                starsCtx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                starsCtx.beginPath();
                // Vẽ sao dạng hạt tròn nhỏ
                starsCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                starsCtx.fill();
            }
        }

        function initStars() {
            starParticles = [];
            for (let i = 0; i < starCount; i++) {
                starParticles.push(new StarParticle());
            }
        }

        // ==========================================
        // --- PHẦN 2: XỬ LÝ MẠNG LƯỚI (NET) ---
        // ==========================================
        class NetParticle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * netCanvas.width;
                this.y = Math.random() * netCanvas.height;
                this.size = Math.random() * 1.5 + 0.5;
                // Di chuyển nhanh hơn sao
                this.speedX = (Math.random() - 0.5) * 0.4; 
                this.speedY = (Math.random() - 0.5) * 0.4;
                this.opacity = Math.random();
                this.fadeSpeed = Math.random() * 0.008 + 0.003;
                this.direction = 1;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                if (this.x > netCanvas.width || this.x < 0) this.speedX *= -1;
                if (this.y > netCanvas.height || this.y < 0) this.speedY *= -1;

                this.opacity += this.fadeSpeed * this.direction;
                if (this.opacity > 0.9 || this.opacity < 0.1) this.direction *= -1;
            }

            draw() {
                netCtx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                netCtx.beginPath();
                netCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                netCtx.fill();
            }
        }

        function initNet() {
            netParticles = [];
            for (let i = 0; i < netParticleCount; i++) {
                netParticles.push(new NetParticle());
            }
        }

        function connectNet() {
            for (let i = 0; i < netParticles.length; i++) {
                for (let j = i; j < netParticles.length; j++) {
                    const dx = netParticles[i].x - netParticles[j].x;
                    const dy = netParticles[i].y - netParticles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < netConnectionDistance) {
                        const lineOpacity = (1 - (dist / netConnectionDistance)) * 0.12;
                        netCtx.strokeStyle = `rgba(255, 255, 255, ${lineOpacity})`;
                        netCtx.lineWidth = 0.5;
                        netCtx.beginPath();
                        netCtx.moveTo(netParticles[i].x, netParticles[i].y);
                        netCtx.lineTo(netParticles[j].x, netParticles[j].y);
                        netCtx.stroke();
                    }
                }
            }
        }

        // ==========================================
        // --- PHẦN 3: HOẠT ẢNH CHÍNH (ANIMATION) ---
        // ==========================================
        function animate() {
            // Xóa cả hai canvas trước khi vẽ lại
            starsCtx.clearRect(0, 0, starsCanvas.width, starsCanvas.height);
            netCtx.clearRect(0, 0, netCanvas.width, netCanvas.height);

            // Vẽ sao (nền)
            starParticles.forEach(p => {
                p.update();
                p.draw();
            });

            // Vẽ mạng lưới mạng lưới (trên)
            netParticles.forEach(p => {
                p.update();
                p.draw();
            });
            connectNet();

            requestAnimationFrame(animate);
        }

        // Khởi tạo lần đầu và bắt đầu hoạt ảnh
        initStars();
        initNet();
        animate();
    </script>
</body>
</html>
